<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fabric-X Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --text: #e1e4ed; --text-muted: #8b8fa3;
      --primary: #6366f1; --primary-hover: #818cf8;
      --success: #22c55e; --error: #ef4444; --warning: #f59e0b;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    a { color: var(--primary); text-decoration: none; }
    a:hover { color: var(--primary-hover); }
    code, .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.875em; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
