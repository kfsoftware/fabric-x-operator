---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - persistentvolumeclaims
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - fabricx.kfsoft.tech
  resources:
  - cas
  - committers
  - endorsers
  - orderergroups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - fabricx.kfsoft.tech
  resources:
  - cas/finalizers
  - committers/finalizers
  - endorsers/finalizers
  - orderergroups/finalizers
  verbs:
  - update
- apiGroups:
  - fabricx.kfsoft.tech
  resources:
  - cas/status
  - committers/status
  - endorsers/status
  - orderergroups/status
  verbs:
  - get
  - patch
  - update
