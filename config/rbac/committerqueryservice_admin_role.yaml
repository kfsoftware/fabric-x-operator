# This rule is not used by the project fabric-x-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over fabricx.kfsoft.tech.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: fabric-x-operator
    app.kubernetes.io/managed-by: kustomize
  name: committerqueryservice-admin-role
rules:
- apiGroups:
  - fabricx.kfsoft.tech
  resources:
  - committerqueryservices
  verbs:
  - '*'
- apiGroups:
  - fabricx.kfsoft.tech
  resources:
  - committerqueryservices/status
  verbs:
  - get
