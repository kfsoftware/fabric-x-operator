                      - caReference
                      type: object
                    mspId:
                      description: MSP ID for the organization
                      type: string
                    name:
                      description: Name of the organization
                      type: string
                    type:
                      description: 'Type of organization: "internal" or "external"'
                      type: string
                  required:
                  - mspId
                  - name
                  - type
                  type: object
                type: array
              channelID:
                description: Channel ID for the genesis block
                type: string
              configTemplate:
                description: Config template reference
                properties:
                  configMapName:
                    description: Name of the ConfigMap containing the template
                    type: string
                  key:
                    description: Key in the ConfigMap containing the template
                    type: string
                required:
                - configMapName
                - key
                type: object
              externalOrgs:
                description: External organizations (with provided certificates)
                items:
                  description: ExternalOrganization represents an organization with
                    externally provided certificates
                  properties:
                    adminCert:
                      description: Admin certificate (base64 encoded)
                      type: string
                    mspId:
                      description: MSP ID for the organization
                      type: string
                    name:
                      description: Name of the organization
                      type: string
                    ordererCert:
                      description: Orderer certificate (base64 encoded, if this is
                        an orderer org)
                      type: string
                    signCert:
                      description: Signing certificate (base64 encoded)
                      type: string
                    tlsCert:
                      description: TLS certificate (base64 encoded)
                      type: string
