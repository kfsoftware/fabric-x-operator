---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: geneses.fabricx.kfsoft.tech
spec:
  group: fabricx.kfsoft.tech
  names:
    kind: Genesis
    listKind: GenesisList
    plural: geneses
    shortNames:
    - genesis
    singular: genesis
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.status
      name: Status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Genesis is the Schema for the genesis API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GenesisSpec defines the desired state of Genesis.
            properties:
              applicationOrgs:
                description: Application organizations (can be internal or external)
                items:
                  description: ApplicationOrganization represents an application organization
                  properties:
                    external:
                      description: External organization configuration (only if Type
                        is "external")
                      properties:
                        adminCert:
                          description: Admin certificate (base64 encoded)
                          type: string
                        peerCert:
                          description: Peer certificate (base64 encoded, optional)
                          type: string
                        signCaCert:
                          description: Signing CA certificate (base64 encoded)
                          type: string
                        tlsCaCert:
                          description: TLS CA certificate (base64 encoded)
                          type: string
                      required:
                      - signCaCert
                      - tlsCaCert
                      type: object
                    internal:
                      description: Internal organization configuration (only if Type
                        is "internal")
                      properties:
                        adminIdentity:
                          description: Admin identity name in the CA
                          type: string
                        caReference:
                          description: Reference to the Fabric CA
                          properties:
                            name:
                              description: Name of the CA resource
                              type: string
                            namespace:
                              description: Namespace of the CA resource
                              type: string
                          required:
                          - name
                          - namespace
                          type: object
                        peerIdentity:
                          description: Peer identity name in the CA (optional)
                          type: string
