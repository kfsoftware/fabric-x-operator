                  - adminCert
                  - mspId
                  - name
                  - signCert
                  - tlsCert
                  type: object
                type: array
              internalOrgs:
                description: Internal organizations (using Fabric CA)
                items:
                  description: InternalOrganization represents an organization that
                    uses Fabric CA
                  properties:
                    adminIdentity:
                      description: Admin identity name in the CA
                      type: string
                    caReference:
                      description: Reference to the Fabric CA
                      properties:
                        name:
                          description: Name of the CA resource
                          type: string
                        namespace:
                          description: Namespace of the CA resource
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                    mspId:
                      description: MSP ID for the organization
                      type: string
                    name:
                      description: Name of the organization
                      type: string
                    ordererIdentity:
                      description: Orderer identity name in the CA (if this is an
                        orderer org)
                      type: string
                  required:
                  - caReference
                  - mspId
                  - name
                  type: object
                type: array
              ordererNodes:
                description: Specific orderer nodes for consensus
                items:
                  description: OrdererNode represents a specific orderer node for
                    consensus
                  properties:
                    clientTlsCert:
                      description: Client TLS certificate (base64 encoded)
                      type: string
                    host:
                      description: Host address of the orderer node
                      type: string
                    id:
                      description: Unique identifier for the orderer node
                      type: integer
                    identity:
                      description: Identity certificate (base64 encoded)
                      type: string
                    mspId:
                      description: MSP ID of the organization this orderer belongs
                        to
                      type: string
                    port:
                      description: Port number for the orderer node
                      type: integer
                    serverTlsCert:
                      description: Server TLS certificate (base64 encoded)
                      type: string
                  required:
                  - clientTlsCert
                  - host
                  - id
                  - identity
                  - mspId
                  - port
                  - serverTlsCert
                  type: object
                type: array
              output:
                description: Output configuration
                properties:
                  blockKey:
                    description: Key in the Secret to store the genesis block
                    type: string
                  secretName:
                    description: Name of the Secret to store the genesis block
                    type: string
                required:
                - blockKey
                - secretName
                type: object
            required:
            - channelID
            - configTemplate
            - output
            type: object
          status:
