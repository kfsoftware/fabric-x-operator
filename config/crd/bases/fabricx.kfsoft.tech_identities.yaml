---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: identities.fabricx.kfsoft.tech
spec:
  group: fabricx.kfsoft.tech
  names:
    kind: Identity
    listKind: IdentityList
    plural: identities
    shortNames:
    - id
    singular: identity
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.mspID
      name: MSPID
      type: string
    - jsonPath: .status.status
      name: Status
      type: string
    - jsonPath: .status.certificateExpiry
      name: Expiry
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Identity is the Schema for the identities API.
          It represents a Fabric identity (user, peer, orderer, admin) with its cryptographic materials.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: IdentitySpec defines the desired state of Identity
            properties:
              enrollment:
                description: Enrollment configuration - used to enroll a new identity
                  with a CA
                properties:
                  affiliation:
                    description: Affiliation for the identity
                    type: string
                  attrs:
                    description: Attributes for the identity
                    items:
                      description: IdentityAttribute defines an attribute for an identity
                      properties:
                        ecert:
                          default: false
                          description: Whether this attribute should be included in
                            the enrollment certificate
                          type: boolean
                        name:
                          description: Name of the attribute
                          type: string
                        value:
                          description: Value of the attribute
                          type: string
                      required:
                      - name
                      - value
                      type: object
                    type: array
                  caRef:
                    description: Reference to the Fabric CA to use for enrollment
                    properties:
                      caCertRef:
                        description: TLS CA certificate reference for connecting to
                          the CA
                        properties:
                          key:
                            description: Secret key
                            type: string
                          name:
                            description: Secret name
                            type: string
                          namespace:
                            description: Namespace of the secret
                            type: string
                        required:
                        - key
                        - name
                        - namespace
                        type: object
                      name:
                        description: Name of the CA custom resource
                        type: string
                      namespace:
                        description: Namespace of the CA (optional, defaults to identity's
                          namespace)
                        type: string
                    required:
                    - name
                    type: object
                  enrollID:
                    description: Enrollment ID (username)
                    type: string
                  enrollSecretRef:
                    description: Enrollment secret (password) reference
                    properties:
                      key:
                        description: Secret key
                        type: string
                      name:
                        description: Secret name
                        type: string
                      namespace:
                        description: Namespace of the secret
                        type: string
                    required:
                    - key
                    - name
                    - namespace
                    type: object
                  enrollTLS:
                    default: true
                    description: Whether to also enroll for TLS certificates
                    type: boolean
                  idemix:
                    description: Idemix enrollment configuration (if using idemix
                      instead of X.509)
                    properties:
                      caRef:
                        description: CA reference for idemix enrollment (defaults
                          to main CARef if not specified)
                        properties:
                          caCertRef:
                            description: TLS CA certificate reference for connecting
                              to the CA
                            properties:
                              key:
                                description: Secret key
                                type: string
                              name:
                                description: Secret name
                                type: string
                              namespace:
                                description: Namespace of the secret
                                type: string
                            required:
                            - key
                            - name
                            - namespace
                            type: object
                          name:
                            description: Name of the CA custom resource
                            type: string
                          namespace:
                            description: Namespace of the CA (optional, defaults to
                              identity's namespace)
                            type: string
                        required:
                        - name
                        type: object
                      enabled:
                        default: true
                        description: Enabled indicates whether idemix enrollment is
                          enabled
                        type: boolean
                    type: object
                  tlsCARef:
                    description: TLS CA reference (if different from signing CA)
                    properties:
                      caCertRef:
                        description: TLS CA certificate reference for connecting to
                          the CA
                        properties:
                          key:
                            description: Secret key
                            type: string
                          name:
                            description: Secret name
                            type: string
                          namespace:
                            description: Namespace of the secret
                            type: string
                        required:
                        - key
                        - name
                        - namespace
                        type: object
                      name:
                        description: Name of the CA custom resource
                        type: string
                      namespace:
                        description: Namespace of the CA (optional, defaults to identity's
                          namespace)
                        type: string
                    required:
                    - name
                    type: object
                required:
                - caRef
                - enrollID
                - enrollSecretRef
                type: object
              mspID:
                description: MSPID for this identity
                type: string
              output:
                description: Output configuration - where to store the identity materials
                properties:
                  labels:
                    additionalProperties:
                      type: string
                    description: Additional labels to apply to output secrets
                    type: object
                  namespace:
                    description: Namespace for output secrets (optional, defaults
                      to identity's namespace)
                    type: string
                  secretPrefix:
                    description: |-
                      Secret name prefix for storing identity materials
                      Will create secrets: <prefix>-sign-cert, <prefix>-sign-key, <prefix>-tls-cert, <prefix>-tls-key
                    type: string
                required:
                - secretPrefix
                type: object
              type:
                description: Type of identity
                enum:
                - client
                - peer
                - orderer
                - admin
                - user
                type: string
            required:
            - enrollment
            - mspID
            - output
            - type
            type: object
          status:
            description: IdentityStatus defines the observed state of Identity
            properties:
              certificateExpiry:
                description: Certificate expiration time
                format: date-time
                type: string
              conditions:
                description: Conditions
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              enrollmentTime:
                description: Enrollment time (when identity was enrolled or imported)
                format: date-time
                type: string
              message:
                description: Message describing the current state
                type: string
              outputSecrets:
                description: Output secrets created
                properties:
                  idemixCred:
                    description: Idemix credential secret name
                    type: string
                  signCACert:
                    description: Sign CA certificate secret name
                    type: string
                  signCert:
                    description: Sign certificate secret name
                    type: string
                  signKey:
                    description: Sign key secret name
                    type: string
                  tlsCACert:
                    description: TLS CA certificate secret name
                    type: string
                  tlsCert:
                    description: TLS certificate secret name
                    type: string
                  tlsKey:
                    description: TLS key secret name
                    type: string
                type: object
              status:
                description: Status of the identity
                type: string
              tlsCertificateExpiry:
                description: TLS certificate expiration time
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
