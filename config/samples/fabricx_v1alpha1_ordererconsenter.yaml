apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: OrdererConsenter
metadata:
  labels:
    app.kubernetes.io/name: fabric-x-operator
    app.kubernetes.io/managed-by: kustomize
  name: ordererconsenter-sample
  namespace: default
spec:
  deploymentMode: "deploy"
  mspid: "OrdererMSP"
  partyID: 1
  consenterID: 1
  replicas: 2
  
  # Storage configuration (optional - uses cluster default if not specified)
  # storageClassName: ""  # Uses cluster default storage class
  pvcAccessModes:
    - "ReadWriteOnce"
  pvcStorageSize: "20Gi"
  
  # Genesis block configuration
  genesis:
    secretName: "fabricx-shared-genesis"
    secretKey: "genesis.block"
    secretNamespace: "default"
  
  # Certificate configuration
  certificates:
    cahost: "test-ca2.default"
    caport: 7054
    catls:
      secretRef:
        key: "tls.crt"
        name: "test-ca2-tls-crypto"
        namespace: "default"
    enrollid: "admin"
    enrollsecret: "adminpw"
  
  # Ingress configuration (optional)
  ingress:
    istio:
      hosts:
        - "consenter-1-org1.localho.st"
      ingressGateway: "istio-ingressgateway"
      port: 443
  
  # Environment variables
  env:
    - name: "CONSENTER_TYPE"
      value: "raft"
    - name: "CONSENTER_BATCH_SIZE"
      value: "500"
  
  # Pod annotations
  podAnnotations:
    fabric-x/consenter-batch-size: "500"
    fabric-x/consenter-type: "raft"
  
  # Resources
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
