apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: Genesis
metadata:
  name: shared-genesis
  namespace: default

spec:
  applicationOrgs:
    - mspId: Org1MSP
      name: Org1MSP
      signCaCertRef:
        key: certfile
        name: test-ca2-msp-crypto
        namespace: default
      tlsCaCertRef:
        key: certfile
        name: test-ca2-tlsca-crypto
        namespace: default
  channelID: arma
  configTemplate:
    configMapName: fabricx-config-template
    key: configtx.yaml
  # Meta namespace verification key (required)
  # This public key will be used for MetaNamespaceVerificationKeyPath in the genesis block
  # Using the admin identity's signing certificate which contains the public key
  metaNamespaceCA:
    key: cert.pem
    name: org1-admin-cert
    namespace: default
  consenters:
    - clientTlsCertRef:
        key: cert.pem
        name: orderergroup-party1-consenter-tls-cert
        namespace: default
      host: orderergroup-party1-consenter.default.svc.cluster.local
      id: 1
      identityRef:
        key: cert.pem
        name: orderergroup-party1-consenter-sign-cert
        namespace: default
      mspId: OrdererMSP
      port: 7052
      serverTlsCertRef:
        key: cert.pem
        name: orderergroup-party1-consenter-tls-cert
        namespace: default
    - clientTlsCertRef:
        key: cert.pem
        name: orderergroup-party2-consenter-tls-cert
