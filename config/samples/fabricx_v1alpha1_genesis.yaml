        port: 7150
        tlsCert:
          key: cert.pem
          name: orderergroup-party4-router-tls-cert
          namespace: default
      batchersConfig:
        - shardID: 1
          host: orderergroup-party4-batcher-0.default.svc.cluster.local
          port: 7151
