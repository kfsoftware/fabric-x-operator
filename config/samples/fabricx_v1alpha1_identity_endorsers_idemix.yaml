# Idemix Identities for Endorsers
---
apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: Identity
metadata:
  name: org1-issuer-idemix
  namespace: default
spec:
  type: client
  mspID: Org1MSP
  enrollment:
    caRef:
      name: endorser-idemix-ca
      namespace: default
    enrollID: issuer
    enrollSecretRef:
      name: issuer-enrollment-secret
      namespace: default
      key: password
    enrollTLS: false
    idemix:
      enabled: true
  output:
    secretPrefix: org1-issuer-idemix
    namespace: default
    labels:
      app: fabric-x
      identity-type: idemix
      endorser: issuer
---
apiVersion: v1
kind: Secret
metadata:
  name: issuer-enrollment-secret
  namespace: default
type: Opaque
stringData:
  password: issuerpw
