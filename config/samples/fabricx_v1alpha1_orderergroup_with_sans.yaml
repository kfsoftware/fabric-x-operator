apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: OrdererGroup
metadata:
  name: orderergroup-with-sans
  namespace: default

spec:
  partyID: 1
  bootstrapMode: configure
  mspid: OrdererMSP
  common:
    imagePullSecrets: []
    podAnnotations:
      prometheus.io/port: '8080'
      prometheus.io/scrape: 'true'
    podLabels:
      app.kubernetes.io/component: fabric-x
      app.kubernetes.io/part-of: admingroup
    replicas: 1
    storage:
      accessMode: ReadWriteOnce
      size: 10Gi
      storageClass: fast-ssd
    volumeMounts:
      - mountPath: /etc/fabric-x/config
        name: shared-config
        readOnly: true
      - mountPath: /etc/fabric-x/certs
        name: shared-certs
        readOnly: true
    volumes:
      - name: shared-config
        volumeSource:
          configMap:
            name: fabric-x-config
      - name: shared-certs
        volumeSource:
          secret:
            secretName: fabric-x-certs
  components:
    assembler:
      # Component-specific SANS configuration (overrides enrollment SANS)
      sans:
        dnsNames:
          - assembler-custom.localho.st
          - assembler-internal.localho.st
        ipAddresses:
          - 192.168.1.100
          - 10.0.0.100
      enrollment:
        sign:
          ca:
            caname: ca
            cahost: test-ca2.default
            caport: 7054
            catls:
              secretRef:
                key: tls.crt
                name: test-ca2-tls-crypto
                namespace: default
            enrollid: admin
            enrollsecret: adminpw
          sans:
            dnsNames:
              - assembler-org1.localho.st
        tls:
          ca:
            caname: tlsca
            cahost: test-ca2.default
            caport: 7054
            catls:
              secretRef:
                key: tls.crt
                name: test-ca2-tls-crypto
                namespace: default
            enrollid: admin
            enrollsecret: adminpw
          sans:
            dnsNames:
              - assembler-org1.localho.st
      env:
        - name: ASSEMBLER_MAX_MESSAGE_COUNT
          value: '500'
      ingress:
        istio:
          hosts:
            - assembler-custom.localho.st
          ingressGateway: ingressgateway
          port: 443
      replicas: 1
    batchers:
      - shardID: 1
        # Component-specific SANS configuration for this batcher instance
        sans:
          dnsNames:
            - batcher-1-custom.localho.st
            - batcher-1-internal.localho.st
          ipAddresses:
            - 192.168.1.101
            - 10.0.0.101
        enrollment:
          sign:
            ca:
              caname: ca
              cahost: test-ca2.default
              caport: 7054
              catls:
                secretRef:
                  key: tls.crt
                  name: test-ca2-tls-crypto
                  namespace: default
              enrollid: admin
              enrollsecret: adminpw
            sans:
              dnsNames:
                - batcher-1-org1.localho.st
          tls:
            ca:
              caname: tlsca
              cahost: test-ca2.default
              caport: 7054
              catls:
                secretRef:
                  key: tls.crt
                  name: test-ca2-tls-crypto
                  namespace: default
              enrollid: admin
              enrollsecret: adminpw
            sans:
              dnsNames:
                - batcher-1-org1.localho.st
        env:
          - name: BATCHER_TIMEOUT
            value: 2s
          - name: BATCHER_PREFERRED_MAX_BYTES
            value: '2097152'
        ingress:
          istio:
            hosts:
              - batcher-1-custom.localho.st
            ingressGateway: ingressgateway
            port: 443
        podLabels:
          fabric-x/batcher-type: high-throughput
          fabric-x/shard-id: '1'
        replicas: 1
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: batcher
      - shardID: 2
        # Component-specific SANS configuration for this batcher instance
        sans:
          dnsNames:
            - batcher-2-custom.localho.st
            - batcher-2-internal.localho.st
          ipAddresses:
            - 192.168.1.102
            - 10.0.0.102
        enrollment:
          sign:
            ca:
              caname: ca
              cahost: test-ca2.default
              caport: 7054
              catls:
                secretRef:
                  key: tls.crt
                  name: test-ca2-tls-crypto
                  namespace: default
              enrollid: admin
              enrollsecret: adminpw
            sans:
              dnsNames:
                - batcher-2-org1.localho.st
          tls:
            ca:
              caname: tlsca
              cahost: test-ca2.default
              caport: 7054
              catls:
                secretRef:
                  key: tls.crt
                  name: test-ca2-tls-crypto
                  namespace: default
              enrollid: admin
              enrollsecret: adminpw
            sans:
              dnsNames:
                - batcher-2-org1.localho.st
        env:
          - name: BATCHER_TIMEOUT
            value: 2s
          - name: BATCHER_PREFERRED_MAX_BYTES
            value: '2097152'
        ingress:
          istio:
            hosts:
              - batcher-2-custom.localho.st
            ingressGateway: ingressgateway
            port: 443
        podLabels:
          fabric-x/batcher-type: high-throughput
          fabric-x/shard-id: '2'
        replicas: 1
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: batcher
    consenter:
      consenterID: 1
      # Component-specific SANS configuration for consenter
      sans:
        dnsNames:
          - consenter-custom.localho.st
          - consenter-internal.localho.st
        ipAddresses:
          - 192.168.1.103
          - 10.0.0.103
      enrollment:
        sign:
          ca:
            caname: ca
            cahost: test-ca2.default
            caport: 7054
            catls:
              secretRef:
                key: tls.crt
                name: test-ca2-tls-crypto
                namespace: default
            enrollid: admin
            enrollsecret: adminpw
          sans:
            dnsNames:
              - consenter-1-org1.localho.st
        tls:
          ca:
            caname: tlsca
            cahost: test-ca2.default
            caport: 7054
            catls:
              secretRef:
                key: tls.crt
                name: test-ca2-tls-crypto
                namespace: default
            enrollid: admin
            enrollsecret: adminpw
          sans:
            dnsNames:
              - consenter-1-org1.localho.st
      endpoints:
        - consenter-custom.localho.st:7050
      env:
        - name: CONSENTER_TYPE
          value: raft
        - name: CONSENTER_BATCH_SIZE
          value: '500'
      ingress:
        istio:
          hosts:
            - consenter-custom.localho.st
          ingressGateway: ingressgateway
          port: 443
      podAnnotations:
        fabric-x/consenter-batch-size: '500'
        fabric-x/consenter-type: raft
      replicas: 1
      volumeMounts: []
      volumes: []
    router:
      # Component-specific SANS configuration for router
      sans:
        dnsNames:
          - router-custom.localho.st
          - router-internal.localho.st
        ipAddresses:
          - 192.168.1.104
          - 10.0.0.104
      enrollment:
        sign:
          ca:
            caname: ca
            cahost: test-ca2.default
            caport: 7054
            catls:
              secretRef:
                key: tls.crt
                name: test-ca2-tls-crypto
                namespace: default
            enrollid: admin
            enrollsecret: adminpw
          sans:
            dnsNames:
              - router-org1.localho.st
        tls:
          ca:
            caname: tlsca
            cahost: test-ca2.default
            caport: 7054
            catls:
              secretRef:
                key: tls.crt
                name: test-ca2-tls-crypto
                namespace: default
            enrollid: admin
            enrollsecret: adminpw
          sans:
            dnsNames:
              - router-org1.localho.st
      env:
        - name: ROUTER_CHANNEL_BUFFER_SIZE
          value: '1000'
      imagePullSecrets: []
      ingress:
        istio:
          hosts:
            - router-custom.localho.st
          ingressGateway: ingressgateway
          port: 443
      replicas: 1
      volumes:
        - name: router-cache
          volumeSource:
            emptyDir:
              medium: Memory
              sizeLimit: 1Gi
  enrollment:
    sign:
      ca:
        caname: ca
        cahost: test-ca2.default
        caport: 7054
        catls:
          secretRef:
            key: tls.crt
            name: test-ca2-tls-crypto
            namespace: default
        enrollid: admin
        enrollsecret: adminpw
      sans:
        dnsNames:
          - default-sign.localho.st
        ipAddresses:
          - 192.168.1.10
    tls:
      ca:
        caname: tlsca
        cahost: test-ca2.default
        caport: 7054
        catls:
          secretRef:
            key: tls.crt
            name: test-ca2-tls-crypto
            namespace: default
        enrollid: admin
        enrollsecret: adminpw
      sans:
        dnsNames:
          - default-tls.localho.st
        ipAddresses:
          - 192.168.1.11
  genesis:
    secretKey: genesis.block
    secretName: fabricx-shared-genesis
    secretNamespace: default
