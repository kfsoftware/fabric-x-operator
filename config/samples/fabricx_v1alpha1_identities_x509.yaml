---
apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: Identity
metadata:
  name: org1-endorser1-sign
  namespace: default
spec:
  enrollment:
    caRef:
      name: endorser-idemix-ca
      namespace: default
    enrollID: endorser1
    enrollSecretRef:
      key: password
      name: endorser1-enrollment-secret
      namespace: default
    enrollTLS: false
  mspID: Org1MSP
  output:
    labels:
      app: fabric-x
      endorser: endorser1
      identity-type: x509-sign
    namespace: default
    secretPrefix: org1-endorser1-sign
  type: client

