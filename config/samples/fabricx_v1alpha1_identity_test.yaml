apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: Identity
metadata:
  name: test-orderer-identity
  namespace: default
spec:
  # Type of identity
  type: orderer

  # MSPID for this identity
  mspID: OrdererMSP

  # Import existing certificates from orderer party1 consenter
  existingCertificates:
    # Signing certificate reference
    signCertRef:
      name: orderergroup-party1-consenter-sign-cert
      key: cert.pem
      namespace: default

    # Signing private key reference
    signKeyRef:
      name: orderergroup-party1-consenter-sign-cert
      key: key.pem
      namespace: default

    # Signing CA certificate reference
    signCACertRef:
      name: orderergroup-party1-consenter-sign-cert
      key: ca.pem
      namespace: default

    # TLS certificate reference (using TLS cert secret)
    tlsCertRef:
      name: orderergroup-party1-consenter-tls-cert
      key: cert.pem
      namespace: default

    # TLS private key reference
    tlsKeyRef:
      name: orderergroup-party1-consenter-tls-cert
      key: key.pem
      namespace: default

    # TLS CA certificate reference
    tlsCACertRef:
      name: orderergroup-party1-consenter-tls-cert
      key: ca.pem
      namespace: default

  # Output configuration
  output:
    # Prefix for output secrets
    secretPrefix: test-orderer-id

    # Labels to apply to output secrets
    labels:
      app: test-identity
      component: orderer
