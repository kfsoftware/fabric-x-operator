apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: OrdererGroup
metadata:
  name: orderergroup-advanced
  namespace: fabric-network
spec:
  bootstrapMode: 'deploy'
  
  # Global common configuration - applies to all components unless overridden
  common:
    replicas: 1
    storage:
      size: "20Gi"
      storageClass: "fast-ssd"
      accessMode: "ReadWriteOnce"
    resources:
      cpuRequests: "1000m"
      cpuLimits: "2000m"
      memoryRequests: "2Gi"
      memoryLimits: "4Gi"
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: true
    # Common pod annotations
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
      fabric-x/version: "1.0.0"
    # Common pod labels
    podLabels:
      app.kubernetes.io/component: "fabric-x"
      app.kubernetes.io/part-of: "orderergroup"
      fabric-x/environment: "production"
    # Common volumes
    volumes:
      - name: "shared-config"
        volumeSource:
          configMap:
            name: "fabric-x-config"
      - name: "shared-certs"
        volumeSource:
          secret:
            secretName: "fabric-x-certs"
      - name: "shared-logs"
        volumeSource:
          persistentVolumeClaim:
            claimName: "fabric-x-logs"
    # Common volume mounts
    volumeMounts:
      - name: "shared-config"
        mountPath: "/etc/fabric-x/config"
        readOnly: true
      - name: "shared-certs"
        mountPath: "/etc/fabric-x/certs"
        readOnly: true
      - name: "shared-logs"
        mountPath: "/var/log/fabric-x"
    # Common image pull secrets
    imagePullSecrets:
      - name: "fabric-x-registry"
    # Common tolerations
    tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
      - key: "dedicated"
        operator: "Equal"
        value: "fabric-x"
        effect: "NoSchedule"
  
  # Genesis block configuration
  genesis:
    secretName: 'fabricx-genesis-advanced'
    secretKey: 'genesis.block'
    secretNamespace: 'fabric-network'
  
  # Global enrollment configuration - inherited by all components
  enrollment:
    sign:
      cahost: 'ca.org1.localho.st'
      caport: 7054
      catls:
        secretRef:
          name: 'org1-ca-sign'
          key: 'ca-cert.pem'
          namespace: 'fabric-network'
      enrollid: 'admin'
      enrollsecret: 'adminpw'
    tls:
      cahost: 'ca.org1.localho.st'
      caport: 7054
      catls:
        secretRef:
          name: 'org1-ca-tls'
          key: 'ca-cert.pem'
          namespace: 'fabric-network'
      enrollid: 'admin'
      enrollsecret: 'adminpw'
  
  # Component-specific configurations with inheritance and overrides
  components:
    # Consenter - high availability with specific storage requirements
    consenter:
      replicas: 3  # Override common replicas for HA
      storage:
        size: "50Gi"  # Override common storage size
        storageClass: "ultra-fast-ssd"  # Override storage class
      ingress:
        istio:
          hosts:
            - 'consenter-org1.localho.st'
            - 'consenter-org1.internal'
          port: 443
          ingressGateway: 'istio-ingressgateway'
          tls:
            enabled: true
            secretName: 'consenter-tls'
      endpoints:
        - 'consenter-org1.localho.st:7050'
        - 'consenter-org1.internal:7050'
      env:
        - name: CONSENTER_TYPE
          value: "raft"
        - name: CONSENTER_BATCH_SIZE
          value: "500"
        - name: CONSENTER_BATCH_TIMEOUT
          value: "2s"
        - name: CONSENTER_ELECTION_TICK
          value: "10"
        - name: CONSENTER_HEARTBEAT_TICK
          value: "1"
      resources:
        cpuRequests: "2000m"  # Override common CPU
        cpuLimits: "4000m"
        memoryRequests: "4Gi"  # Override common memory
        memoryLimits: "8Gi"
      # Component-specific pod annotations
      podAnnotations:
        fabric-x/consenter-type: "raft"
        fabric-x/consenter-batch-size: "500"
        fabric-x/consenter-election-tick: "10"
      # Component-specific volumes
      volumes:
        - name: "consenter-data"
          volumeSource:
            persistentVolumeClaim:
              claimName: "consenter-pvc"
        - name: "consenter-wal"
          volumeSource:
            persistentVolumeClaim:
              claimName: "consenter-wal-pvc"
      # Component-specific volume mounts
      volumeMounts:
        - name: "consenter-data"
          mountPath: "/var/fabric-x/consenter/data"
        - name: "consenter-wal"
          mountPath: "/var/fabric-x/consenter/wal"
      # Component-specific affinity
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "node-role.kubernetes.io/worker"
                    operator: "Exists"
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/component: "consenter"
              topologyKey: "kubernetes.io/hostname"
      # Component-specific tolerations
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "consenter"
          effect: "NoSchedule"
    
    # Batcher - multiple replicas with load balancing
    batcher:
      replicas: 5  # Override common replicas
      ingress:
        istio:
          hosts:
            - 'batcher-org1.localho.st'
          port: 443
          ingressGateway: 'istio-ingressgateway'
          tls:
            enabled: true
            secretName: 'batcher-tls'
      env:
        - name: BATCHER_TIMEOUT
          value: "2s"
        - name: BATCHER_PREFERRED_MAX_BYTES
          value: "2097152"
        - name: BATCHER_ABSOLUTE_MAX_BYTES
          value: "1048576"
        - name: BATCHER_MAX_MESSAGE_COUNT
          value: "500"
      resources:
        cpuRequests: "500m"  # Use common CPU
        memoryRequests: "1Gi"  # Use common memory
      # Inherit common storage settings
      # Component-specific pod labels
      podLabels:
        fabric-x/batcher-type: "high-throughput"
        fabric-x/batcher-replicas: "5"
      # Component-specific volumes
      volumes:
        - name: "batcher-cache"
          volumeSource:
            emptyDir:
              medium: "Memory"
              sizeLimit: "2Gi"
      # Component-specific volume mounts
      volumeMounts:
        - name: "batcher-cache"
          mountPath: "/var/fabric-x/batcher/cache"
      # Component-specific affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: "batcher"
                topologyKey: "kubernetes.io/hostname"
    
    # Assembler - single instance with high performance
    assembler:
      replicas: 1  # Use common replicas
      ingress:
        istio:
          hosts:
            - 'assembler-org1.localho.st'
          port: 443
          ingressGateway: 'istio-ingressgateway'
          tls:
            enabled: true
            secretName: 'assembler-tls'
      env:
        - name: ASSEMBLER_MAX_MESSAGE_COUNT
          value: "500"
        - name: ASSEMBLER_PREFERRED_MAX_BYTES
          value: "2097152"
        - name: ASSEMBLER_ABSOLUTE_MAX_BYTES
          value: "1048576"
      resources:
        cpuRequests: "1500m"  # Override common CPU
        cpuLimits: "3000m"
        memoryRequests: "3Gi"  # Override common memory
        memoryLimits: "6Gi"
      # Override enrollment for this component
      certificates:
        cahost: 'ca.org1.localho.st'
        caport: 7054
        catls:
          secretRef:
            name: 'org1-ca-assembler'  # Component-specific CA
            key: 'ca-cert.pem'
            namespace: 'fabric-network'
        enrollid: 'assembler-admin'
        enrollsecret: 'assembler-pw'
      # Component-specific pod annotations
      podAnnotations:
        fabric-x/assembler-type: "high-performance"
        fabric-x/assembler-cpu: "1500m"
      # Component-specific volumes
      volumes:
        - name: "assembler-temp"
          volumeSource:
            emptyDir:
              medium: "Memory"
              sizeLimit: "5Gi"
      # Component-specific volume mounts
      volumeMounts:
        - name: "assembler-temp"
          mountPath: "/tmp/assembler"
      # Component-specific image pull secrets
      imagePullSecrets:
        - name: "assembler-registry"
        - name: "fabric-x-registry"
    
    # Router - multiple instances with different configurations
    router:
      replicas: 2  # Override common replicas
      ingress:
        istio:
          hosts:
            - 'router-org1.localho.st'
            - 'router-org1-backup.localho.st'
          port: 443
          ingressGateway: 'istio-ingressgateway'
          tls:
            enabled: true
            secretName: 'router-tls'
      env:
        - name: ROUTER_CHANNEL_BUFFER_SIZE
          value: "1000"
        - name: ROUTER_MAX_CONCURRENT_REQUESTS
          value: "100"
        - name: ROUTER_TIMEOUT
          value: "30s"
      storage:
        size: "30Gi"  # Override common storage size
        storageClass: "fast-ssd"  # Use common storage class
      # Use common resources and enrollment settings
      # Component-specific pod labels
      podLabels:
        fabric-x/router-type: "load-balancer"
        fabric-x/router-replicas: "2"
      # Component-specific volumes
      volumes:
        - name: "router-cache"
          volumeSource:
            emptyDir:
              medium: "Memory"
              sizeLimit: "1Gi"
        - name: "router-config"
          volumeSource:
            configMap:
              name: "router-specific-config"
      # Component-specific volume mounts
      volumeMounts:
        - name: "router-cache"
          mountPath: "/var/fabric-x/router/cache"
        - name: "router-config"
          mountPath: "/etc/fabric-x/router/config"
          readOnly: true
      # Component-specific affinity
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: "node-role.kubernetes.io/edge"
                    operator: "Exists"
      # Component-specific tolerations
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "router"
          effect: "NoSchedule"
        - key: "edge-node"
          operator: "Exists"
          effect: "NoSchedule" 