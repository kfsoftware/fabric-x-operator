apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: CommitterQueryService
metadata:
  labels:
    app.kubernetes.io/name: fabric-x-operator
    app.kubernetes.io/managed-by: kustomize
  name: committerqueryservice-sample
  namespace: default
spec:
  # Bootstrap mode: "configure" or "deploy"
  bootstrapMode: deploy

  # MSP ID for the committer query service
  mspid: Org1MSP

  # Party ID for the query service
  partyID: 1

  # Number of replicas
  replicas: 1

  # Storage configuration
  storage:
    size: 5Gi
    storageClass: standard
    accessMode: ReadWriteOnce

  # Resource requirements
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Security context
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000

  # Pod annotations
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9001"

  # Pod labels
  podLabels:
    component: query-service
    environment: production

  # Environment variables
  env:
    - name: QUERY_SERVICE_LOG_LEVEL
      value: INFO
    - name: QUERY_SERVICE_PARALLELISM
      value: "80"

  # Command and args
  command:
    - committer
  args:
    - start-query
    - --config=/config/config.yaml

  # Ingress configuration with Istio
  ingress:
    istio:
      enabled: true
      hosts:
        - query-service.example.com
      ingressGateway: ingressgateway
      port: 443

  # Enrollment configuration for certificates
  enrollment:
    sign:
      ca:
        caname: ca
        cahost: fabric-ca.default
        caport: 7054
        catls:
          secretRef:
            name: fabric-ca-tls
            namespace: default
            key: tls.crt
      csr:
        cn: query-service
        names:
          c: US
          st: "North Carolina"
          l: Durham
          o: Hyperledger
          ou: Fabric
      enrollment:
        profile: tls
      mspdir: msp
    tls:
      ca:
        caname: tlsca
        cahost: fabric-ca.default
        caport: 7054
        catls:
          secretRef:
            name: fabric-ca-tls
            namespace: default
            key: tls.crt
      csr:
        cn: query-service
        names:
          c: US
          st: "North Carolina"
          l: Durham
          o: Hyperledger
          ou: Fabric
      enrollment:
        profile: tls
      mspdir: tls

  # SANS (Subject Alternative Names) for TLS certificate
  sans:
    dns:
      - query-service
      - query-service.default
      - query-service.default.svc.cluster.local
      - query-service.example.com
    ip:
      - 127.0.0.1

  # Component-specific endpoints
  endpoints:
    - query-service.default.svc.cluster.local:9001

  # Volumes
  volumes:
    - name: extra-config
      configMap:
        name: query-service-extra-config

  # Volume mounts
  volumeMounts:
    - name: extra-config
      mountPath: /etc/extra-config
      readOnly: true

  # Affinity rules
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: component
                  operator: In
                  values:
                    - query-service
            topologyKey: kubernetes.io/hostname

  # Tolerations
  tolerations:
    - key: node.kubernetes.io/not-ready
      operator: Exists
      effect: NoExecute
      tolerationSeconds: 300

  # Image pull secrets
  imagePullSecrets:
    - name: regcred

  # PostgreSQL database configuration
  postgresql:
    host: postgresql-rw.default.svc.cluster.local
    port: 5432
    database: queryservice
    username: queryservice
    passwordSecret:
      name: postgresql-credentials
      namespace: default
      key: password
    maxConnections: 50
    minConnections: 10
    loadBalance: true
    retry:
      maxElapsedTime: 5m
