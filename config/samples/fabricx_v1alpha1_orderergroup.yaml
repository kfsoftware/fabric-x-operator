apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: OrdererGroup
metadata:
  name: orderergroup-sample
  namespace: default

spec:
  partyID: 1
  bootstrapMode: configure
  mspid: OrdererMSP
  common:
    imagePullSecrets:
      - name: fabric-x-registry
    podAnnotations:
      prometheus.io/port: '8080'
      prometheus.io/scrape: 'true'
    podLabels:
      app.kubernetes.io/component: fabric-x
      app.kubernetes.io/part-of: admingroup
    replicas: 1
    securityContext:
      readOnlyRootFilesystem: true
      runAsGroup: 1000
      runAsUser: 1000
    storage:
      accessMode: ReadWriteOnce
      size: 10Gi
      storageClass: fast-ssd
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
        operator: Exists
    volumeMounts:
      - mountPath: /etc/fabric-x/config
        name: shared-config
        readOnly: true
      - mountPath: /etc/fabric-x/certs
        name: shared-certs
        readOnly: true
    volumes:
      - name: shared-config
        volumeSource:
          configMap:
            name: fabric-x-config
      - name: shared-certs
        volumeSource:
          secret:
            secretName: fabric-x-certs
  components:
    assembler:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: assembler
                topologyKey: kubernetes.io/hostname
              weight: 100
      certificates:
        cahost: test-ca2.default
        caport: 7054
        catls:
          secretRef:
            key: tls.crt
            name: test-ca2-tls-crypto
            namespace: default
        enrollid: admin
        enrollsecret: adminpw
      env:
        - name: ASSEMBLER_MAX_MESSAGE_COUNT
          value: '500'
      ingress:
        istio:
          hosts:
            - assembler-org1.localho.st
          ingressGateway: istio-ingressgateway
          port: 443
      replicas: 1
    batchers:
      - shardID: 1
        certificates:
          cahost: test-ca2.default
          caport: 7054
          catls:
            secretRef:
              key: tls.crt
              name: test-ca2-tls-crypto
              namespace: default
          enrollid: admin
          enrollsecret: adminpw
        env:
          - name: BATCHER_TIMEOUT
            value: 2s
          - name: BATCHER_PREFERRED_MAX_BYTES
            value: '2097152'
        ingress:
          istio:
            hosts:
              - batcher-1-org1.localho.st
            ingressGateway: istio-ingressgateway
            port: 443
        podLabels:
          fabric-x/batcher-type: high-throughput
          fabric-x/shard-id: '1'
        replicas: 1
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: batcher
        volumeMounts:
          - name: batcher-1-store
            mountPath: /orderergroup-sample/batcher-1/store
        volumes:
          - name: batcher-1-store
            volumeSource:
              persistentVolumeClaim:
                claimName: batcher-1-store-pvc
    consenter:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/worker
                    operator: Exists
      certificates:
        cahost: test-ca2.default
        caport: 7054
        catls:
          secretRef:
            key: tls.crt
            name: test-ca2-tls-crypto
            namespace: default
        enrollid: admin
        enrollsecret: adminpw
      endpoints:
        - consenter-org1.localho.st:7050
      env:
        - name: CONSENTER_TYPE
          value: raft
        - name: CONSENTER_BATCH_SIZE
          value: '500'
      ingress:
        istio:
          hosts:
            - consenter-org1.localho.st
          ingressGateway: istio-ingressgateway
          port: 443
      podAnnotations:
        fabric-x/consenter-batch-size: '500'
        fabric-x/consenter-type: raft
      replicas: 4
      volumeMounts:
        - mountPath: /var/fabric-x/consenter
          name: consenter-data
      volumes:
        - name: consenter-data
          volumeSource:
            persistentVolumeClaim:
              claimName: consenter-pvc
    router:
      certificates:
        cahost: test-ca2.default
        caport: 7054
        catls:
          secretRef:
            key: tls.crt
            name: test-ca2-tls-crypto
            namespace: default
        enrollid: admin
        enrollsecret: adminpw
      env:
        - name: ROUTER_CHANNEL_BUFFER_SIZE
          value: '1000'
      imagePullSecrets:
        - name: router-registry
        - name: fabric-x-registry
      ingress:
        istio:
          hosts:
            - router-org1.localho.st
          ingressGateway: istio-ingressgateway
          port: 443
      replicas: 1
      volumes:
        - name: router-cache
          volumeSource:
            emptyDir:
              medium: Memory
              sizeLimit: 1Gi
  enrollment:
    sign:
      cahost: test-ca2.default
      caport: 7054
      catls:
        secretRef:
          key: tls.crt
          name: test-ca2-tls-crypto
          namespace: default
      enrollid: admin
      enrollsecret: adminpw
    tls:
      cahost: test-ca2.default
      caport: 7054
      catls:
        secretRef:
          key: tls.crt
          name: test-ca2-tls-crypto
          namespace: default
      enrollid: admin
      enrollsecret: adminpw
  genesis:
    secretKey: genesis.block
    secretName: fabricx-shared-genesis
    secretNamespace: default
