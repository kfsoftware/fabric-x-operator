# Test file to demonstrate bootstrap mode functionality
# This file shows how to use bootstrapMode and deploymentMode for all four components

---
# Test 1: Configure mode - only creates secrets/certificates
apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: OrdererConsenter
metadata:
  name: test-consenter-configure
  namespace: default
spec:
  bootstrapMode: "configure"  # Only create secrets, don't deploy
  deploymentMode: "configure" # Only create configuration resources
  mspid: "OrdererMSP"
  partyID: 1
  consenterID: 1
  certificates:
    cahost: "test-ca2.default"
    caport: 7054
    catls:
      secretRef:
        key: "tls.crt"
        name: "test-ca2-tls-crypto"
        namespace: "default"
    enrollid: "admin"
    enrollsecret: "adminpw"

---
# Test 2: Deploy mode - creates secrets and deploys
apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: OrdererConsenter
metadata:
  name: test-consenter-deploy
  namespace: default
spec:
  bootstrapMode: "deploy"     # Create secrets and deploy
  deploymentMode: "deploy"    # Create full deployment
  mspid: "OrdererMSP"
  partyID: 1
  consenterID: 1
  replicas: 1
  certificates:
    cahost: "test-ca2.default"
    caport: 7054
    catls:
      secretRef:
        key: "tls.crt"
        name: "test-ca2-tls-crypto"
        namespace: "default"
    enrollid: "admin"
    enrollsecret: "adminpw"

