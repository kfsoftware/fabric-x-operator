name: E2E Tests

on:
  push:
  pull_request:

jobs:
  test-e2e:
    name: Run E2E on K3D
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install K3D
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Create K3D cluster
        run: |
          k3d cluster create test-cluster \
            --agents 2 \
            --wait \
            --timeout 5m
          kubectl cluster-info
          kubectl get nodes

      - name: Pre-pull and import Fabric images into K3D
        run: |
          # Pull images in parallel
          docker pull hyperledger/fabric-ca:1.5.15 &
          docker pull hyperledger/fabric-x-orderer:0.0.24 &
          docker pull hyperledger/fabric-x-committer:0.1.9 &
          wait

          # Import into K3D cluster
          k3d image import \
            hyperledger/fabric-ca:1.5.15 \
            hyperledger/fabric-x-orderer:0.0.24 \
            hyperledger/fabric-x-committer:0.1.9 \
            -c test-cluster

      - name: Running E2E tests
        env:
          CLUSTER_TYPE: k3d
          K3D_CLUSTER: test-cluster
        run: |
          go mod tidy
          make test-e2e-k3d

      - name: Cleanup K3D cluster
        if: always()
        run: k3d cluster delete test-cluster
