apiVersion: fabricx.kfsoft.tech/v1alpha1
kind: OrdererGroup
metadata:
  name: test-orderergroup
  namespace: default
  labels:
    app.kubernetes.io/name: fabric-x-operator
    app.kubernetes.io/managed-by: kustomize
spec:
  bootstrapMode: 'configure' # can be "configure" or "deploy"
  
  # Common configuration applied to all components
  common:
    replicas: 1
    storage:
      size: "10Gi"
      storageClass: "fast-ssd"
      accessMode: "ReadWriteOnce"
    resources:
      cpuRequests: "500m"
      cpuLimits: "1000m"
      memoryRequests: "1Gi"
      memoryLimits: "2Gi"
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      readOnlyRootFilesystem: true
    # Common pod annotations
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "8080"
    # Common pod labels
    podLabels:
      app.kubernetes.io/component: "fabric-x"
      app.kubernetes.io/part-of: "orderergroup"
    # Common volumes
    volumes:
      - name: "shared-config"
        volumeSource:
          configMap:
            name: "fabric-x-config"
      - name: "shared-certs"
        volumeSource:
          secret:
            secretName: "fabric-x-certs"
    # Common volume mounts
    volumeMounts:
      - name: "shared-config"
        mountPath: "/etc/fabric-x/config"
        readOnly: true
      - name: "shared-certs"
        mountPath: "/etc/fabric-x/certs"
        readOnly: true
    # Common image pull secrets
    imagePullSecrets:
      - name: "fabric-x-registry"
    # Common tolerations
    tolerations:
      - key: "node-role.kubernetes.io/master"
        operator: "Exists"
        effect: "NoSchedule"
  
  # Genesis block configuration
  genesis:
    secretName: 'fabricx-genesis'
    secretKey: 'genesis.block'
    secretNamespace: 'default'
  
  # Global enrollment configuration (inherited by components)
  enrollment:
    sign:
      cahost: 'test-ca2'
      caport: 7054
      catls:
        secretRef:
          name: 'test-ca2'
          key: 'ca-cert.pem'
          namespace: 'default'
      enrollid: 'admin'
      enrollsecret: 'adminpw'
    tls:
      cahost: 'test-ca2'
      caport: 7054
      catls:
        secretRef:
          name: 'test-ca2'
          key: 'ca-cert.pem'
          namespace: 'default'
      enrollid: 'admin'
      enrollsecret: 'adminpw'
  
  # Component-specific configurations
  components:
    # Consenter configuration
    consenter:
      replicas: 1
      ingress:
        istio:
          hosts:
            - 'consenter-test-orderergroup.default.svc.cluster.local'
          port: 443
          ingressGateway: 'istio-ingressgateway'
      endpoints:
        - 'consenter-test-orderergroup.default.svc.cluster.local:7050'
      env:
        - name: CONSENTER_TYPE
          value: "raft"
        - name: CONSENTER_BATCH_SIZE
          value: "500"
      # Component-specific certificates (optional - will inherit from global enrollment)
      certificates:
        cahost: 'test-ca2'
        caport: 7054
        catls:
          secretRef:
            name: 'test-ca2'
            key: 'ca-cert.pem'
            namespace: 'default'
        enrollid: 'admin'
        enrollsecret: 'adminpw'
      # Component-specific pod annotations
      podAnnotations:
        fabric-x/consenter-type: "raft"
        fabric-x/consenter-batch-size: "500"
      # Component-specific volumes
      volumes:
        - name: "consenter-data"
          volumeSource:
            persistentVolumeClaim:
              claimName: "consenter-pvc"
      # Component-specific volume mounts
      volumeMounts:
        - name: "consenter-data"
          mountPath: "/var/fabric-x/consenter"
      # Component-specific affinity
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "node-role.kubernetes.io/worker"
                    operator: "Exists"
    
    # Batcher configuration (inherits common settings, overrides replicas)
    batcher:
      replicas: 2
      ingress:
        istio:
          hosts:
            - 'batcher-test-orderergroup.default.svc.cluster.local'
          port: 443
          ingressGateway: 'istio-ingressgateway'
      env:
        - name: BATCHER_TIMEOUT
          value: "2s"
        - name: BATCHER_PREFERRED_MAX_BYTES
          value: "2097152"
      # Component-specific certificates (optional - will inherit from global enrollment)
      certificates:
        cahost: 'test-ca2'
        caport: 7054
        catls:
          secretRef:
            name: 'test-ca2'
            key: 'ca-cert.pem'
            namespace: 'default'
        enrollid: 'admin'
        enrollsecret: 'adminpw'
      # Component-specific pod labels
      podLabels:
        fabric-x/batcher-type: "high-throughput"
      # Component-specific tolerations
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "batcher"
          effect: "NoSchedule"
    
    # Assembler configuration (inherits common settings)
    assembler:
      replicas: 1
      ingress:
        istio:
          hosts:
            - 'assembler-test-orderergroup.default.svc.cluster.local'
          port: 443
          ingressGateway: 'istio-ingressgateway'
      env:
        - name: ASSEMBLER_MAX_MESSAGE_COUNT
          value: "500"
      # Component-specific certificates (optional - will inherit from global enrollment)
      certificates:
        cahost: 'test-ca2'
        caport: 7054
        catls:
          secretRef:
            name: 'test-ca2'
            key: 'ca-cert.pem'
            namespace: 'default'
        enrollid: 'admin'
        enrollsecret: 'adminpw'
      # Component-specific affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: "assembler"
                topologyKey: "kubernetes.io/hostname"
    
    # Router configuration (inherits common settings)
    router:
      replicas: 1
      ingress:
        istio:
          hosts:
            - 'router-test-orderergroup.default.svc.cluster.local'
          port: 443
          ingressGateway: 'istio-ingressgateway'
      env:
        - name: ROUTER_CHANNEL_BUFFER_SIZE
          value: "1000"
      # Component-specific certificates (optional - will inherit from global enrollment)
      certificates:
        cahost: 'test-ca2'
        caport: 7054
        catls:
          secretRef:
            name: 'test-ca2'
            key: 'ca-cert.pem'
            namespace: 'default'
        enrollid: 'admin'
        enrollsecret: 'adminpw'
      # Component-specific image pull secrets
      imagePullSecrets:
        - name: "router-registry"
        - name: "fabric-x-registry"
      # Component-specific volumes
      volumes:
        - name: "router-cache"
          volumeSource:
            emptyDir:
              medium: "Memory"
              sizeLimit: "1Gi" 