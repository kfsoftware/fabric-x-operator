{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "fabric-x-operator.fullname" . }}-manager
  labels:
    {{- include "fabric-x-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - persistentvolumeclaims
      - secrets
      - serviceaccounts
      - services
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [fabricx.kfsoft.tech]
    resources:
      - caenrollments
      - cas
      - chainnamespaces
      - committercoordinators
      - committerqueryservices
      - committers
      - committersidecars
      - committervalidators
      - committerverifiers
      - endorsers
      - geneses
      - identities
      - ordererassemblers
      - ordererbatchers
      - ordererconsenters
      - orderergroups
      - ordererrouters
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [fabricx.kfsoft.tech]
    resources:
      - caenrollments/finalizers
      - cas/finalizers
      - chainnamespaces/finalizers
      - committercoordinators/finalizers
      - committerqueryservices/finalizers
      - committers/finalizers
      - committersidecars/finalizers
      - committervalidators/finalizers
      - committerverifiers/finalizers
      - endorsers/finalizers
      - geneses/finalizers
      - identities/finalizers
      - ordererassemblers/finalizers
      - ordererbatchers/finalizers
      - ordererconsenters/finalizers
      - orderergroups/finalizers
      - ordererrouters/finalizers
    verbs: [update]
  - apiGroups: [fabricx.kfsoft.tech]
    resources:
      - caenrollments/status
      - cas/status
      - chainnamespaces/status
      - committercoordinators/status
      - committerqueryservices/status
      - committers/status
      - committersidecars/status
      - committervalidators/status
      - committerverifiers/status
      - endorsers/status
      - geneses/status
      - identities/status
      - ordererassemblers/status
      - ordererbatchers/status
      - ordererconsenters/status
      - orderergroups/status
      - ordererrouters/status
    verbs: [get, patch, update]
  - apiGroups: [gateway.networking.k8s.io]
    resources: [gateways, httproutes, tcproutes, tlsroutes]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [networking.istio.io]
    resources: [destinationrules, virtualservices]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses/status]
    verbs: [get, patch, update]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [rolebindings, roles]
    verbs: [create, delete, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "fabric-x-operator.fullname" . }}-manager
  labels:
    {{- include "fabric-x-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "fabric-x-operator.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "fabric-x-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fabric-x-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fabric-x-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fabric-x-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fabric-x-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fabric-x-operator.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "fabric-x-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
